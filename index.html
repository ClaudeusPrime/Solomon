<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#F2EEE6;--bg2:#EBE5DB;--bg3:#E3DDD3;--border:#DDD8CE;--gold:#C9A84C;--gold-dim:#A8842A;--text:#28231C;--text-dim:#60584E;--text-faint:#908878;--greek:#1C1714;--accent:#3B6D45}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif}
#app{display:grid;grid-template-columns:190px 1fr 340px;height:100vh}
#nav{background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
#nav-header{padding:0;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer}
#book-list{overflow-y:auto;flex:1;padding:6px 0}
.book-item{display:block;width:100%}
.book-btn{display:block;width:100%;padding:5px 16px;background:none;border:none;color:var(--text-dim);font-size:12px;font-family:'Inter',sans-serif;text-align:left;cursor:pointer;transition:color .12s,background .12s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.book-btn:hover{color:var(--text);background:var(--bg3)}
.book-btn.open{color:var(--gold)}
.book-btn .arrow{float:right;font-size:9px;margin-top:2px;color:var(--text-faint);transition:transform .15s}
.book-btn.open .arrow{transform:rotate(90deg)}
.book-chapters{display:none;flex-wrap:wrap;gap:3px;padding:4px 10px 8px 16px;background:var(--bg3)}
.book-chapters.open{display:flex}
.ch-btn{width:26px;height:26px;background:var(--bg2);border:1px solid var(--border);color:var(--text-dim);font-size:10px;cursor:pointer;border-radius:3px;transition:all .12s}
.ch-btn:hover{border-color:var(--gold-dim);color:var(--text)}
.ch-btn.active{background:var(--gold);border-color:var(--gold);color:var(--bg);font-weight:600}
#main{display:flex;flex-direction:column;overflow:hidden}
#main-header{padding:12px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;background:var(--bg);flex-shrink:0;gap:12px}
#ref-display{font-family:'Noto Serif',serif;font-size:14px;color:var(--gold);letter-spacing:.03em}
#mode-toggle{display:flex;gap:0}
.mode-btn{padding:5px 14px;background:none;border:1px solid var(--border);color:var(--text-dim);font-size:11px;font-family:'Inter',sans-serif;cursor:pointer;transition:all .12s;letter-spacing:.04em}
.mode-btn:first-child{border-radius:3px 0 0 3px}
.mode-btn:last-child{border-radius:0 3px 3px 0;border-left:none}
.mode-btn.active{background:var(--gold);border-color:var(--gold);color:#28231C;font-weight:500}
.mode-btn:not(.active):hover{color:var(--text);background:var(--bg3)}
#search-input{margin-left:auto;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:6px 12px;font-size:12px;font-family:'Inter',sans-serif;border-radius:3px;width:190px;outline:none;transition:border-color .15s}
#search-input:focus{border-color:var(--gold-dim)}
#search-input::placeholder{color:var(--text-faint)}
#reading-pane{flex:1;overflow-y:auto;padding:28px 44px 64px}
#reading-pane.hidden{display:none}
#loading{display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-faint);font-size:13px}
.verse-row{display:flex;gap:10px;margin-bottom:14px;align-items:baseline}
.vnum{font-size:10px;color:var(--text-faint);min-width:22px;text-align:right;padding-top:2px;flex-shrink:0;font-variant-numeric:tabular-nums}
.verse-body{flex:1;font-family:'Noto Serif',serif;font-size:17px;line-height:1.85;color:var(--text)}
.ew{display:inline;border-radius:2px;padding:0 1px}
.ew.linked{cursor:pointer;transition:color .1s,background .1s}
.ew.linked:hover{color:var(--gold);background:rgba(201,168,76,.1)}
.ew.selected{color:var(--bg) !important;background:var(--gold) !important}
.ew.unlinked,.ew.supplied{color:var(--text)}
.ew.supplied{font-style:italic}
.punct{display:inline}
.def-paren{color:var(--text-dim);font-style:italic;font-size:.92em}
#search-results{display:none;overflow-y:auto;padding:24px 44px;flex:1}
.sr-ref{font-size:11px;color:var(--gold);margin-bottom:5px;letter-spacing:.04em;cursor:pointer}
.sr-ref:hover{text-decoration:underline}
.sr-text{font-family:'Noto Serif',serif;font-size:15px;color:var(--text);line-height:1.75;margin-bottom:18px;padding-bottom:18px;border-bottom:1px solid var(--border)}
mark{background:rgba(201,168,76,.2);color:var(--gold);border-radius:2px;padding:0 2px}
#detail{background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
#detail-inner{flex:1;overflow-y:auto}
#detail-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text-faint);font-size:12px;gap:12px;padding:32px;text-align:center;line-height:1.6}
.empty-gk{font-family:'Noto Serif Display',serif;font-size:42px;color:var(--border);font-weight:300}
#word-hero{padding:24px 22px 18px;background:var(--bg3);border-bottom:1px solid var(--border)}
#hero-eng{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--text-faint);margin-bottom:10px}
#hero-gk{font-family:'Noto Serif Display',serif;font-size:46px;font-weight:300;color:var(--gold);line-height:1.1}
#hero-lemma{font-family:'Noto Serif',serif;font-size:14px;color:var(--text-dim);margin-top:6px;font-style:italic}
#hero-translit{font-size:11px;color:var(--text-faint);margin-top:3px;letter-spacing:.07em}
#hero-strongs{font-size:10px;color:var(--gold-dim);margin-top:5px;letter-spacing:.05em}
.dsec{padding:14px 22px;border-bottom:1px solid var(--border)}
.dsec:last-child{border-bottom:none}
.dlabel{font-size:9px;text-transform:uppercase;letter-spacing:.12em;color:var(--text-faint);margin-bottom:8px}
.dcontent{font-size:13px;color:var(--text);line-height:1.65}
.dcontent.def{font-family:'Noto Serif',serif;font-size:14px;line-height:1.75}
.dcontent.etym{font-size:12px;color:var(--text-dim)}
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px 14px}
.mkey{font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--text-faint)}
.mval{font-size:12px;color:var(--accent);margin-top:2px;text-transform:capitalize}
.kjv-tag{display:inline-block;background:rgba(201,168,76,.08);border:1px solid var(--gold-dim);color:var(--gold);font-size:10px;padding:2px 7px;border-radius:2px;margin:2px 2px 2px 0}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
@media (max-width: 768px) {
  #app{grid-template-columns:1fr;grid-template-rows:auto 1fr;height:100vh;position:relative}
  #nav{position:fixed;top:0;left:0;bottom:0;width:280px;z-index:100;transform:translateX(-100%);transition:transform .25s ease;box-shadow:4px 0 20px rgba(0,0,0,.15)}
  #nav.open{transform:translateX(0)}
  #nav-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:99}
  #nav-overlay.open{display:block}
  #detail{position:fixed;bottom:0;left:0;right:0;height:50vh;z-index:98;border-left:none;border-top:1px solid var(--border);transform:translateY(100%);transition:transform .25s ease;border-radius:16px 16px 0 0}
  #detail.open{transform:translateY(0)}
  #detail-handle{display:block;width:40px;height:4px;background:var(--border);border-radius:2px;margin:10px auto 0;flex-shrink:0}
  #main{grid-column:1;grid-row:1/-1}
  #main-header{padding:10px 14px;gap:8px}
  #hamburger{display:flex;align-items:center;justify-content:center;width:36px;height:36px;background:none;border:1px solid var(--border);border-radius:6px;cursor:pointer;flex-shrink:0}
  #hamburger span{display:block;width:16px;height:1.5px;background:var(--text);box-shadow:0 5px 0 var(--text),0 -5px 0 var(--text)}
  #ref-display{font-size:13px;flex:1;text-align:center}
  #mode-toggle{flex-shrink:0}
  .mode-btn{padding:5px 8px;font-size:10px}
  #search-input{display:none}
  #reading-pane{padding:16px 18px 120px}
  .verse-body{font-size:16px}
  #nav-header{padding:8px 0 4px}
}
@media (min-width: 769px) {
  #hamburger{display:none}
  #nav-overlay{display:none !important}
  #detail-handle{display:none}
  #detail{transform:none !important}
}
.concordance{max-height:200px;overflow-y:auto;margin-top:4px}
.conc-ref{font-size:12px;color:var(--gold);padding:3px 0;cursor:pointer;border-bottom:1px solid var(--border)}
.conc-ref:hover{color:var(--text-dim)}
.conc-ref:last-child{border-bottom:none}
</style>
</head>

  {a:'Php',n:'Philippians'},{a:'Col',n:'Colossians'},{a:'1Th',n:'1 Thessalonians'},
  {a:'2Th',n:'2 Thessalonians'},{a:'1Ti',n:'1 Timothy'},{a:'2Ti',n:'2 Timothy'},
  {a:'Tit',n:'Titus'},{a:'Phm',n:'Philemon'},{a:'Heb',n:'Hebrews'},
  {a:'Jas',n:'James'},{a:'1Pe',n:'1 Peter'},{a:'2Pe',n:'2 Peter'},
  {a:'1Jn',n:'1 John'},{a:'2Jn',n:'2 John'},{a:'3Jn',n:'3 John'},
  {a:'Jud',n:'Jude'},{a:'Re',n:'Revelation'}
];
const DATA_BASE = './';

var currentBook = null;
var currentBookData = null;
var currentChapter = 1;
var selectedWordEl = null;
var currentMode = 'kjv';
var pinnedTok = null;
var pinnedStrongs = null;
var bookCache = {};

// ── BOOK LIST WITH ACCORDION ───────────────────────────────────────────────
function renderBookList() {
  var html = '';
  for (var i = 0; i < ALL_BOOKS.length; i++) {
    var b = ALL_BOOKS[i];
    html += '<div class="book-item">';
    html += '<button class="book-btn" data-abbr="' + b.a + '" onclick="toggleBook(this)">' + b.n + ' <span class="arrow">&#9660;</span></button>';
    html += '<div class="book-chapters" id="bc-' + b.a + '"></div>';
    html += '</div>';
  }
  document.getElementById('book-list').innerHTML = html;
}

function toggleBook(btn) {
  var abbr = btn.dataset.abbr;
  var bc = document.getElementById('bc-' + abbr);
  var wasOpen = bc.classList.contains('open');
  // Close all
  document.querySelectorAll('.book-chapters').forEach(function(el) { el.classList.remove('open'); });
  document.querySelectorAll('.book-btn').forEach(function(el) { el.classList.remove('open'); });
  if (!wasOpen) {
    openBook(abbr, btn, bc);
  }
}

async function openBook(abbr, btn, bc) {
  await loadBook(abbr);
  if (!currentBookData || currentBook !== abbr) return;
  // Build chapter buttons inside the accordion
  var chs = Object.keys(currentBookData.chapters).map(Number).sort(function(a,b){return a-b;});
  var inner = '';
  for (var i = 0; i < chs.length; i++) {
    inner += '<button class="ch-btn" data-ch="' + chs[i] + '" onclick="goChapter(' + chs[i] + ')">' + chs[i] + '</button>';
  }
  bc.innerHTML = inner;
  bc.classList.add('open');
  btn.classList.add('open');
  goChapter(1);
}

function hideSearch() {
  document.getElementById('search-results').style.display = 'none';
  document.getElementById('reading-pane').classList.remove('hidden');
}

function goChapter(ch) {
  currentChapter = ch;
  // Highlight active chapter
  document.querySelectorAll('.ch-btn').forEach(function(b) {
    b.classList.toggle('active', +b.dataset.ch === ch);
  });
  hideSearch();
  if (!currentBookData) return;
  var verses = currentBookData.chapters[String(ch)];
  if (!verses) return;
  document.getElementById('ref-display').textContent = currentBookData.book + ' ' + ch;
  resetDetail();
  selectedWordEl = null;
  renderVerses(verses);
}

// ── LOAD BOOK ──────────────────────────────────────────────────────────────
async function loadBook(abbr) {
  if (bookCache[abbr]) { currentBookData = bookCache[abbr]; currentBook = abbr; return; }
  currentBookData = null;
  currentBook = null;
  setLoading('Loading ' + abbr + '...');
  try {
    var r = await fetch(DATA_BASE + abbr + '.json');
    if (!r.ok) throw new Error('not ok');
    bookCache[abbr] = await r.json();
    currentBookData = bookCache[abbr];
    currentBook = abbr;
  } catch(e) {
    setLoading('Could not load ' + abbr + '. Make sure JSON files are in the repo root.');
  }
}

// ── RENDER VERSES ──────────────────────────────────────────────────────────
function renderVerses(verses) {
  var html = '';
  for (var vi = 0; vi < verses.length; vi++) {
    var verse = verses[vi];
    var words = '';
    for (var wi = 0; wi < verse.w.length; wi++) {
      var tok = verse.w[wi];
      if (tok.p !== undefined) {
        words += '<span class="punct">' + tok.p + '</span>';
      } else if (tok.s) {
        var d = encodeURIComponent(JSON.stringify(tok));
        if (currentMode === 'interlinear') {
          var def = getDefinition(tok.s);
          var defHtml = def ? ' <span class="def-paren">(' + def + ')</span>' : '';
          words += '<span class="ew linked" data-w="' + d + '" onclick="selectWord(this)">' + tok.e + '</span>' + defHtml;
        } else {
          words += '<span class="ew linked" data-w="' + d + '" onclick="selectWord(this)">' + tok.e + '</span>';
        }
      } else if (tok.i) {
        words += '<span class="ew supplied">' + tok.e + '</span>';
      } else {
        words += '<span class="ew unlinked">' + tok.e + '</span>';
      }
    }
    html += '<div class="verse-row"><span class="vnum">' + verse.v + '</span><span class="verse-body">' + words + '</span></div>';
  }
  document.getElementById('reading-pane').innerHTML = html;
  if (pinnedStrongs) {
    setTimeout(function() { highlightAndScroll(pinnedStrongs); }, 50);
  }
}

// ── WORD CLICK ─────────────────────────────────────────────────────────────
function selectWord(el) {
  var tok = JSON.parse(decodeURIComponent(el.dataset.w));
  pinnedTok = tok;
  pinnedStrongs = tok.s || null;
  if (selectedWordEl) selectedWordEl.classList.remove('selected');
  selectedWordEl = el;
  el.classList.add('selected');
  var entry = LEX[tok.s] || {};
  var m = tok.m || {};
  var morphKeys = [['pos','Part of speech'],['tense','Tense'],['voice','Voice'],
    ['mood','Mood'],['person','Person'],['case','Case'],['number','Number'],['gender','Gender']];
  var morphHtml = '';
  for (var i = 0; i < morphKeys.length; i++) {
    if (m[morphKeys[i][0]]) {
      morphHtml += '<div><div class="mkey">' + morphKeys[i][1] + '</div><div class="mval">' + m[morphKeys[i][0]] + '</div></div>';
    }
  }
  var kjvTags = '';
  if (entry.k) {
    var kjv = entry.k.replace(/^[^a-zA-Z]+/, '');
    var parts = kjv.split(/[,;]/);
    for (var j = 0; j < Math.min(parts.length, 8); j++) {
      var u = parts[j].trim().replace(/\s+/g, ' ');
      if (u) kjvTags += '<span class="kjv-tag">' + u + '</span>';
    }
  }
  var cleanGk = (tok.g || '').replace(/[.,;·?!'"()\u2800-\u28ff\u0387]/g, '');
  var showLemma = tok.l && tok.l !== cleanGk;
  var detail = '<div id="word-hero">';
  detail += '<div id="hero-eng">' + tok.e + '</div>';
  detail += '<div id="hero-gk">' + (cleanGk || tok.l || '') + '</div>';
  if (showLemma) detail += '<div id="hero-lemma">' + tok.l + '</div>';
  if (entry.t) detail += '<div id="hero-translit">' + entry.t + '</div>';
  if (tok.s) detail += '<div id="hero-strongs">' + tok.s + '</div>';
  detail += '</div>';
  if (entry.d) detail += '<div class="dsec"><div class="dlabel">Definition</div><div class="dcontent def">' + entry.d + '</div></div>';
  if (morphHtml) detail += '<div class="dsec"><div class="dlabel">Parsing</div><div class="mgrid">' + morphHtml + '</div></div>';
  if (kjvTags) detail += '<div class="dsec"><div class="dlabel">KJV renders as</div><div>' + kjvTags + '</div></div>';
  if (entry.e) detail += '<div class="dsec"><div class="dlabel">Etymology</div><div class="dcontent etym">' + entry.e + '</div></div>';
  var conc = showConcordance(tok.s);
  if (conc) detail += conc;
  document.getElementById('detail-inner').innerHTML = detail;
}

function getDefinition(strongs) {
  var entry = LEX[strongs];
  if (!entry || !entry.d) return '';
  var def = entry.d.replace(/\n/g, ' ').trim();
  var semi = def.indexOf(';');
  if (semi > 10 && semi < 60) def = def.slice(0, semi);
  return def.replace(/[,;:.]+$/, '').trim();
}

// ── INTERLINEAR TOGGLE ─────────────────────────────────────────────────────
function setMode(mode) {
  currentMode = mode;
  document.getElementById('btn-kjv').classList.toggle('active', mode === 'kjv');
  document.getElementById('btn-interlinear').classList.toggle('active', mode === 'interlinear');
  if (currentBookData) goChapter(currentChapter);
}

// ── SEARCH ─────────────────────────────────────────────────────────────────
function setupSearch() {
  var inp = document.getElementById('search-input');
  var t;
  inp.addEventListener('input', function() {
    clearTimeout(t);
    t = setTimeout(function() {
      var q = inp.value.trim();
      if (q.length >= 2) doSearch(q); else hideSearch();
    }, 300);
  });
  inp.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') { inp.value = ''; hideSearch(); }
  });
}





function resetDetail() {
  document.getElementById('detail-inner').innerHTML =
    '<div id="detail-empty"><div class="empty-gk">&#955;&#972;&#947;&#959;&#962;</div><div>Click any word to see<br>its Greek original,<br>definition, and parsing.</div></div>';
}

function setLoading(msg) { document.getElementById('reading-pane').innerHTML = '<div id="loading">' + msg + '</div>'; }

// ── HOME ───────────────────────────────────────────────────────────────────
function highlightAndScroll(strongs) {
  // Find all linked words in the reading pane
  var words = document.querySelectorAll('.ew.linked');
  var first = null;
  for (var i = 0; i < words.length; i++) {
    try {
      var tok = JSON.parse(decodeURIComponent(words[i].dataset.w));
      if (tok.s === strongs) {
        words[i].classList.add('selected');
        if (!first) first = words[i];
      }
    } catch(e) {}
  }
  // Scroll first occurrence into view
  if (first) {
    first.scrollIntoView({behavior: 'smooth', block: 'center'});
  }
}

function goHome() {
  var btn = document.querySelector('[data-abbr="Mt"]');
  var bc = document.getElementById('bc-Mt');
  document.querySelectorAll('.book-chapters').forEach(function(el) { el.classList.remove('open'); });
  document.querySelectorAll('.book-btn').forEach(function(el) { el.classList.remove('open'); });
  if (btn && bc) openBook('Mt', btn, bc);
}

// ── INIT ───────────────────────────────────────────────────────────────────
renderBookList();
setupSearch();
loadSearchIndex();
goHome();


function toggleNav() {
  document.getElementById('nav').classList.toggle('open');
  document.getElementById('nav-overlay').classList.toggle('open');
}
function closeNav() {
  document.getElementById('nav').classList.remove('open');
  document.getElementById('nav-overlay').classList.remove('open');
}
function openDetailSheet() {
  if (window.innerWidth <= 768) document.getElementById('detail').classList.add('open');
}
function closeDetailSheet() {
  document.getElementById('detail').classList.remove('open');
}
(function() {
  var det = document.getElementById('detail');
  var startY = 0;
  det.addEventListener('touchstart', function(e) { startY = e.touches[0].clientY; }, {passive:true});
  det.addEventListener('touchend', function(e) {
    if (e.changedTouches[0].clientY - startY > 60) closeDetailSheet();
  }, {passive:true});
  var origToggleBook = toggleBook;
  toggleBook = function(btn) { origToggleBook(btn); if (window.innerWidth <= 768) setTimeout(closeNav, 300); };
  var origSelectWord = selectWord;
  selectWord = function(el) { origSelectWord(el); openDetailSheet(); };
})();
// ── SEARCH INDEX ──────────────────────────────────────────────────────────
var searchIndex = null;

async function loadSearchIndex() {
  try {
    var r = await fetch(DATA_BASE + 'search_index.json');
    if (!r.ok) throw new Error('not ok');
    searchIndex = await r.json();
    console.log('Search index loaded:', searchIndex.v.length, 'verses');
  } catch(e) {
    console.warn('Search index not available:', e);
  }
}

// ── WHOLE-NT SEARCH ───────────────────────────────────────────────────────
function doSearch(q) {
  var inp = document.getElementById('search-input');
  var sr = document.getElementById('search-results');
  document.getElementById('reading-pane').classList.add('hidden');
  sr.style.display = 'block';

  if (!searchIndex) {
    sr.innerHTML = '<div style="color:var(--text-faint);font-size:13px">Search index loading...</div>';
    return;
  }

  var ql = q.toLowerCase().trim();
  var vids = searchIndex.w[ql] || [];

  // Also try partial matches for words not exactly in index
  if (vids.length === 0) {
    for (var word in searchIndex.w) {
      if (word.indexOf(ql) !== -1) {
        var matches = searchIndex.w[word];
        for (var i = 0; i < matches.length; i++) {
          if (vids.indexOf(matches[i]) === -1) vids.push(matches[i]);
        }
      }
    }
  }

  if (vids.length === 0) {
    sr.innerHTML = '<div style="color:var(--text-faint);font-size:13px">No results for "' + q + '"</div>';
    return;
  }

  function highlight(str) {
    var lower = str.toLowerCase();
    var out = '', i = 0;
    while (i < str.length) {
      var pos = lower.indexOf(ql, i);
      if (pos === -1) { out += str.slice(i); break; }
      out += str.slice(i, pos) + '<mark>' + str.slice(pos, pos + q.length) + '</mark>';
      i = pos + q.length;
    }
    return out;
  }

  var BOOK_NAMES = {
    Mt:'Matthew',Mk:'Mark',Lk:'Luke',Jn:'John',Ac:'Acts',
    Ro:'Romans','1Co':'1 Corinthians','2Co':'2 Corinthians',
    Ga:'Galatians',Eph:'Ephesians',Php:'Philippians',Col:'Colossians',
    '1Th':'1 Thessalonians','2Th':'2 Thessalonians','1Ti':'1 Timothy',
    '2Ti':'2 Timothy',Tit:'Titus',Phm:'Philemon',Heb:'Hebrews',
    Jas:'James','1Pe':'1 Peter','2Pe':'2 Peter','1Jn':'1 John',
    '2Jn':'2 John','3Jn':'3 John',Jud:'Jude',Re:'Revelation'
  };

  var html = '<div style="color:var(--text-faint);font-size:11px;margin-bottom:20px">' +
    vids.length + ' verse' + (vids.length !== 1 ? 's' : '') + ' — NT</div>';

  for (var i = 0; i < Math.min(vids.length, 100); i++) {
    var verse = searchIndex.v[vids[i]];
    var abbr = verse[0], ch = verse[1], v = verse[2], text = verse[3];
    var bookName = BOOK_NAMES[abbr] || abbr;
    html += '<div class="sr-ref" onclick="jumpTo(\'' + abbr + '\',' + ch + ')">' +
      bookName + ' ' + ch + ':' + v + '</div>';
    html += '<div class="sr-text">' + highlight(text) + '</div>';
  }

  if (vids.length > 100) {
    html += '<div style="color:var(--text-faint);font-size:11px;margin-top:8px">Showing 100 of ' + vids.length + ' results — refine your search</div>';
  }

  sr.innerHTML = html;
}

// ── CONCORDANCE (all verses for a strongs number) ─────────────────────────
function showConcordance(strongs) {
  if (!searchIndex) return;
  var vids = searchIndex.s[strongs] || [];
  if (vids.length === 0) return;

  var BOOK_NAMES = {
    Mt:'Matthew',Mk:'Mark',Lk:'Luke',Jn:'John',Ac:'Acts',
    Ro:'Romans','1Co':'1 Corinthians','2Co':'2 Corinthians',
    Ga:'Galatians',Eph:'Ephesians',Php:'Philippians',Col:'Colossians',
    '1Th':'1 Thessalonians','2Th':'2 Thessalonians','1Ti':'1 Timothy',
    '2Ti':'2 Timothy',Tit:'Titus',Phm:'Philemon',Heb:'Hebrews',
    Jas:'James','1Pe':'1 Peter','2Pe':'2 Peter','1Jn':'1 John',
    '2Jn':'2 John','3Jn':'3 John',Jud:'Jude',Re:'Revelation'
  };

  var html = '<div class="dsec"><div class="dlabel">All occurrences (' + vids.length + ' verses)</div><div class="concordance">';
  for (var i = 0; i < vids.length; i++) {
    var verse = searchIndex.v[vids[i]];
    var abbr = verse[0], ch = verse[1], v = verse[2];
    var bookName = BOOK_NAMES[abbr] || abbr;
    html += '<div class="conc-ref" onclick="jumpTo(\'' + abbr + '\',' + ch + ')">' +
      bookName + ' ' + ch + ':' + v + '</div>';
  }
  html += '</div></div>';
  return html;
}

// ── JUMP TO BOOK+CHAPTER ──────────────────────────────────────────────────
async function jumpTo(abbr, ch) {
  document.getElementById('search-input').value = '';
  hideSearch();
  document.querySelectorAll('.book-chapters').forEach(function(el) { el.classList.remove('open'); });
  document.querySelectorAll('.book-btn').forEach(function(el) { el.classList.remove('open'); });
  var btn = document.querySelector('[data-abbr="' + abbr + '"]');
  var bc = document.getElementById('bc-' + abbr);
  if (btn && bc) {
    await openBook(abbr, btn, bc);
    goChapter(ch);
    if (btn) btn.scrollIntoView({block:'nearest'});
    // Repopulate detail panel with pinned word
    if (pinnedTok) {
      setTimeout(function() {
        var entry = LEX[pinnedTok.s] || {};
        var m = pinnedTok.m || {};
        var morphKeys = [['pos','Part of speech'],['tense','Tense'],['voice','Voice'],
          ['mood','Mood'],['person','Person'],['case','Case'],['number','Number'],['gender','Gender']];
        var morphHtml = '';
        for (var i = 0; i < morphKeys.length; i++) {
          if (m[morphKeys[i][0]]) morphHtml += '<div><div class="mkey">' + morphKeys[i][1] + '</div><div class="mval">' + m[morphKeys[i][0]] + '</div></div>';
        }
        var kjvTags = '';
        if (entry.k) {
          var kjv = entry.k.replace(/^[^a-zA-Z]+/, '');
          var parts = kjv.split(/[,;]/);
          for (var j = 0; j < Math.min(parts.length, 8); j++) {
            var u = parts[j].trim().replace(/\s+/g, ' ');
            if (u) kjvTags += '<span class="kjv-tag">' + u + '</span>';
          }
        }
        var cleanGk = (pinnedTok.g || '').replace(/[.,;·?!'"()⠀-⣿·]/g, '');
        var showLemma = pinnedTok.l && pinnedTok.l !== cleanGk;
        var detail = '<div id="word-hero">';
        detail += '<div id="hero-eng">' + pinnedTok.e + '</div>';
        detail += '<div id="hero-gk">' + (cleanGk || pinnedTok.l || '') + '</div>';
        if (showLemma) detail += '<div id="hero-lemma">' + pinnedTok.l + '</div>';
        if (entry.t) detail += '<div id="hero-translit">' + entry.t + '</div>';
        if (pinnedTok.s) detail += '<div id="hero-strongs">' + pinnedTok.s + '</div>';
        detail += '</div>';
        if (entry.d) detail += '<div class="dsec"><div class="dlabel">Definition</div><div class="dcontent def">' + entry.d + '</div></div>';
        if (morphHtml) detail += '<div class="dsec"><div class="dlabel">Parsing</div><div class="mgrid">' + morphHtml + '</div></div>';
        if (kjvTags) detail += '<div class="dsec"><div class="dlabel">KJV renders as</div><div>' + kjvTags + '</div></div>';
        if (entry.e) detail += '<div class="dsec"><div class="dlabel">Etymology</div><div class="dcontent etym">' + entry.e + '</div></div>';
        var conc = showConcordance(pinnedTok.s);
        if (conc) detail += conc;
        document.getElementById('detail-inner').innerHTML = detail;
        if (window.innerWidth <= 768) document.getElementById('detail').classList.add('open');
      }, 100);
    }
  }
}

</script>
